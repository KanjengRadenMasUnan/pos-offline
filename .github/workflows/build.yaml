name: Build Split APKs per ABI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Get Flutter Dependencies
      run: flutter pub get

    # 🟢 Menggunakan perintah bawaan Flutter, tidak butuh chmod +x gradlew lagi
    - name: Build Split APKs via Flutter
      run: flutter build apk --split-per-abi --release

    # 🟢 Mengunggah hasil build dari output folder default Flutter
    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: split-apks
        path: build/app/outputs/flutter-apk/
