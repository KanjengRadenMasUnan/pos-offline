name: Build Split APKs per ABI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    # Langkah alternatif jika kamu butuh Flutter SDK untuk proses build (sangat disarankan untuk Flutter)
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Get Flutter Dependencies
      run: flutter pub get

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew
      working-directory: android

    - name: Build Split APKs
      run: ./gradlew assembleRelease
      working-directory: android

    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: split-apks
        path: android/app/build/outputs/apk/release/ # 🟢 Path output juga disesuaikan ke folder android
