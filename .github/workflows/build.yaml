name: Build Split APKs per ABI

on:
  push:
    branches: [ "main" ] # Jalankan setiap ada push ke branch main
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle' # Mengaktifkan cache agar build berikutnya lebih cepat

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # Langkah utama untuk melakukan build APK
    - name: Build Split APKs
      run: ./gradlew assembleRelease

    # Mengunggah hasil build (Artifact) ke GitHub agar bisa di-download
    - name: Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: split-apks
        path: app/build/outputs/apk/release/
