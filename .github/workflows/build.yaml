name: Flutter Build APK

# Menentukan kapan workflow ini berjalan (contoh: saat push ke branch main)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout kode dari repository GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Java Development Kit (JDK) yang diperlukan untuk Android
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu' # Berbagai opsi tersedia, zulu umum digunakan
        java-version: '17'

    # 3. Setup Flutter Environment
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x' # Menggunakan versi 3 terbaru, atau tentukan versi spesifik (misal: '3.22.0')
        channel: 'stable'

    # 4. Ambil semua dependencies (pub get)
    - name: Install dependencies
      run: flutter pub get

    # 5. Jalankan proses Build APK
    # --release untuk produksi, atau --debug jika hanya untuk testing internal
    - name: Build APK
      run: flutter build apk --release

    # 6. Upload hasil build (Artifact) agar bisa didownload
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
